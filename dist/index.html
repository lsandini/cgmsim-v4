<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGMSIM v4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg-panel: #161b22;
      --bg-surface: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;

      --green: #26a641;
      --amber: #d29922;
      --red: #da3633;
      --green-range: rgba(38, 166, 65, 0.15);
      --amber-range: rgba(210, 153, 34, 0.25);
      --red-range: rgba(218, 54, 51, 0.25);

      --trace-color: #58a6ff;
      --trace-glow: rgba(88, 166, 255, 0.4);

      --panel-width: 340px;
      --control-height: 80px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: 1fr var(--control-height);
      grid-template-columns: 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* Canvas area */
    #canvas-area {
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #cgm-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Side panel overlay */
    #side-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: var(--control-height);
      width: var(--panel-width);
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      overflow-y: auto;
      z-index: 10;
    }

    #side-panel.open {
      transform: translateX(0);
    }

    /* Control strip */
    #control-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      height: var(--control-height);
    }

    /* Sim time display */
    #sim-time {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      min-width: 90px;
      letter-spacing: 0.04em;
    }

    /* Current CGM */
    #current-cgm {
      font-family: 'Courier New', monospace;
      font-size: 26px;
      font-weight: 700;
      min-width: 80px;
      color: var(--trace-color);
    }

    #current-cgm.hypo-l1 { color: var(--amber); }
    #current-cgm.hypo-l2 { color: var(--red); }

    #cgm-unit {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: -8px;
      align-self: flex-end;
      padding-bottom: 4px;
    }

    #trend-arrow {
      font-size: 22px;
      min-width: 24px;
    }

    /* Pause/play button */
    #btn-pause {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #btn-pause:hover { background: rgba(88, 166, 255, 0.15); }
    #btn-pause.running { border-color: var(--amber); color: var(--amber); }

    /* Throttle control */
    #throttle-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    #throttle-label {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    #throttle-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-surface);
      outline: none;
      cursor: pointer;
    }
    #throttle-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }
    #throttle-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }

    /* Quick action buttons */
    .quick-btn {
      height: 44px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .quick-btn:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.08); }
    .quick-btn.meal { border-color: var(--amber); color: var(--amber); }
    .quick-btn.meal:hover { background: rgba(210, 153, 34, 0.12); }

    /* Panel toggle */
    #btn-panel {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #btn-panel:hover { color: var(--text); border-color: var(--accent); }

    /* Display unit toggle */
    #unit-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      z-index: 5;
    }
    #unit-toggle:hover { color: var(--text); }

    /* IOB / COB overlay */
    #iob-cob {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #iob-cob span { color: var(--text); font-weight: 600; }

    /* Side panel inner */
    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .panel-row label {
      font-size: 13px;
      color: var(--text-muted);
      min-width: 0;
    }

    .panel-row input[type="number"],
    .panel-row select {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      width: 100px;
      text-align: right;
    }

    .panel-row input[type="number"]:focus,
    .panel-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .bolus-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .bolus-row input[type="number"] {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 15px;
    }

    .bolus-row button {
      height: 36px;
      padding: 0 14px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
    }
    .bolus-row button:hover { background: rgba(88, 166, 255, 0.15); }

    /* Scenario chip */
    #scenario-badge {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-size: 11px;
      color: var(--text-muted);
      pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-bUgQkQ3w.js"></script>
</head>
<body>
  <div id="app">
    <div id="canvas-area">
      <canvas id="cgm-canvas"></canvas>

      <button id="unit-toggle" title="Toggle display units">mg/dL</button>

      <div id="iob-cob">
        IOB <span id="iob-val">0.00</span> U &nbsp;
        COB <span id="cob-val">0</span> g
      </div>

      <div id="scenario-badge">Default patient · AID mode</div>

      <!-- Collapsible side panel -->
      <div id="side-panel">
        <div class="panel-section">
          <h3>Events</h3>
          <div class="bolus-row">
            <input type="number" id="bolus-amount" min="0.5" max="20" step="0.5" value="4" />
            <button id="btn-bolus">💉 Bolus</button>
          </div>
          <div class="bolus-row" style="margin-top: 8px;">
            <input type="number" id="meal-carbs" min="5" max="150" step="5" value="60" />
            <button id="btn-meal" style="border-color: var(--amber); color: var(--amber);">🍽 Meal</button>
          </div>
        </div>

        <div class="panel-section">
          <h3>Therapy</h3>
          <div class="panel-row">
            <label>Mode</label>
            <select id="therapy-mode">
              <option value="AID">AID (PID)</option>
              <option value="PUMP">Pump (open loop)</option>
              <option value="MDI">MDI</option>
            </select>
          </div>
          <div class="panel-row">
            <label>Target glucose</label>
            <input type="number" id="glucose-target" min="70" max="180" step="5" value="100" />
          </div>
          <div class="panel-row">
            <label>Programmed ISF</label>
            <input type="number" id="prog-isf" min="10" max="200" step="5" value="40" />
          </div>
          <div class="panel-row">
            <label>Programmed ICR</label>
            <input type="number" id="prog-cr" min="3" max="30" step="1" value="12" />
          </div>
          <div class="panel-row">
            <label>Basal rate (U/hr)</label>
            <input type="number" id="basal-rate" min="0" max="5" step="0.05" value="0.80" />
          </div>
        </div>

        <div class="panel-section">
          <h3>Patient</h3>
          <div class="panel-row">
            <label>True ISF</label>
            <input type="number" id="true-isf" min="10" max="200" step="5" value="40" />
          </div>
          <div class="panel-row">
            <label>True ICR</label>
            <input type="number" id="true-cr" min="3" max="30" step="1" value="12" />
          </div>
          <div class="panel-row">
            <label>EGP amplitude</label>
            <input type="number" id="egp-amp" min="0" max="3" step="0.1" value="1.0" />
          </div>
          <div class="panel-row">
            <label>EGP peak hour</label>
            <input type="number" id="egp-peak" min="0" max="23" step="1" value="5" />
          </div>
        </div>

        <div class="panel-section">
          <h3>Overlays</h3>
          <div class="panel-row">
            <label>Show IOB curve</label>
            <input type="checkbox" id="overlay-iob" checked />
          </div>
          <div class="panel-row">
            <label>Show COB curve</label>
            <input type="checkbox" id="overlay-cob" checked />
          </div>
          <div class="panel-row">
            <label>Show true glucose</label>
            <input type="checkbox" id="overlay-true" />
          </div>
        </div>
      </div>
    </div>

    <!-- Control strip -->
    <div id="control-strip">
      <button id="btn-pause" title="Pause / Resume">▶</button>

      <div id="throttle-area">
        <div id="throttle-label">
          <span>Speed</span>
          <span id="throttle-val">×10</span>
        </div>
        <input type="range" id="throttle-slider"
               min="0" max="7" step="1" value="3" />
      </div>

      <div id="sim-time">D+00:00</div>

      <div style="display:flex; align-items:baseline; gap:2px;">
        <div id="current-cgm">---</div>
        <div id="cgm-unit">mg/dL</div>
      </div>
      <div id="trend-arrow">→</div>

      <button class="quick-btn meal" id="btn-quick-meal" title="60g meal">🍽 60g</button>
      <button class="quick-btn" id="btn-quick-bolus" title="4U bolus">💉 4U</button>
      <button id="btn-panel" title="Toggle panel">⚙</button>
    </div>
  </div>

</body>
</html>

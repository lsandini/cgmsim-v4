<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGMSIM v4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg-panel: #161b22;
      --bg-surface: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;

      --green: #26a641;
      --amber: #d29922;
      --red: #da3633;
      --green-range: rgba(38, 166, 65, 0.15);
      --amber-range: rgba(210, 153, 34, 0.25);
      --red-range: rgba(218, 54, 51, 0.25);

      --trace-color: #58a6ff;
      --trace-glow: rgba(88, 166, 255, 0.4);

      --panel-width: 340px;
      --control-height: 80px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: 1fr var(--control-height);
      grid-template-columns: 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* Canvas area */
    #canvas-area {
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #cgm-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Side panel overlay */
    #side-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: var(--control-height);
      width: var(--panel-width);
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      overflow-y: auto;
      z-index: 10;
    }

    #side-panel.open {
      transform: translateX(0);
    }

    /* Control strip */
    #control-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      height: var(--control-height);
    }

    /* Sim time display */
    #sim-time {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      min-width: 90px;
      letter-spacing: 0.04em;
    }

    /* Current CGM */
    #current-cgm {
      font-family: 'Courier New', monospace;
      font-size: 26px;
      font-weight: 700;
      min-width: 80px;
      color: var(--trace-color);
    }

    #current-cgm.hypo-l1 { color: var(--amber); }
    #current-cgm.hypo-l2 { color: var(--red); }

    #cgm-unit {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: -8px;
      align-self: flex-end;
      padding-bottom: 4px;
    }

    #trend-arrow {
      font-size: 22px;
      min-width: 24px;
    }

    /* Pause/play button */
    #btn-pause {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #btn-pause:hover { background: rgba(88, 166, 255, 0.15); }
    #btn-pause.running { border-color: var(--amber); color: var(--amber); }

    /* Throttle control */
    #throttle-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    #throttle-label {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    #throttle-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-surface);
      outline: none;
      cursor: pointer;
    }
    #throttle-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }
    #throttle-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }

    /* Quick action buttons */
    .quick-btn {
      height: 44px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .quick-btn:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.08); }
    .quick-btn.meal { border-color: var(--amber); color: var(--amber); }
    .quick-btn.meal:hover { background: rgba(210, 153, 34, 0.12); }

    /* Panel toggle */
    #btn-panel {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #btn-panel:hover { color: var(--text); border-color: var(--accent); }

    /* Display unit toggle */
    #unit-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      z-index: 5;
    }
    #unit-toggle:hover { color: var(--text); }

    /* IOB / COB overlay */
    #iob-cob {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #iob-cob span { color: var(--text); font-weight: 600; }

    /* Side panel inner */
    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .panel-row label {
      font-size: 13px;
      color: var(--text-muted);
      min-width: 0;
    }

    .panel-row input[type="number"],
    .panel-row select {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      width: 100px;
      text-align: right;
    }

    .panel-row input[type="number"]:focus,
    .panel-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .bolus-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .bolus-row input[type="number"] {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 15px;
    }

    .bolus-row button {
      height: 36px;
      padding: 0 14px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
    }
    .bolus-row button:hover { background: rgba(88, 166, 255, 0.15); }

    /* Scenario chip */
    #scenario-badge {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-size: 11px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Panel tabs */
    #panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
    }

    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Session buttons */
    .session-btn {
      display: block;
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 6px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .session-btn:hover { border-color: var(--accent); }
    .session-btn.danger { border-color: var(--red); color: var(--red); }
    .session-btn.danger:hover { background: rgba(218,54,51,0.1); }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-area">
      <canvas id="cgm-canvas"></canvas>

      <button id="unit-toggle" title="Toggle display units">mg/dL</button>

      <div id="iob-cob">
        IOB <span id="iob-val">0.00</span> U &nbsp;
        COB <span id="cob-val">0</span> g
      </div>

      <div id="scenario-badge">Default patient · AID mode</div>

      <!-- Collapsible side panel -->
      <div id="side-panel">

        <!-- Tab bar -->
        <div id="panel-tabs">
          <button class="tab-btn active" data-tab="events">Events</button>
          <button class="tab-btn" data-tab="therapy">Therapy</button>
          <button class="tab-btn" data-tab="patient">Patient</button>
          <button class="tab-btn" data-tab="session">Session</button>
        </div>

        <!-- Events tab -->
        <div class="tab-content active" id="tab-events">
          <div class="panel-section">
            <h3>Inject</h3>
            <div class="bolus-row">
              <input type="number" id="bolus-amount" min="0.5" max="20" step="0.5" value="4" />
              <button id="btn-bolus">💉 Bolus</button>
            </div>
            <div class="bolus-row" style="margin-top: 8px;">
              <input type="number" id="meal-carbs" min="5" max="150" step="5" value="60" />
              <button id="btn-meal" style="border-color: var(--amber); color: var(--amber);">🍽 Meal</button>
            </div>
          </div>
          <div class="panel-section">
            <h3>Overlays</h3>
            <div class="panel-row">
              <label>IOB curve</label>
              <input type="checkbox" id="overlay-iob" checked />
            </div>
            <div class="panel-row">
              <label>COB curve</label>
              <input type="checkbox" id="overlay-cob" checked />
            </div>
            <div class="panel-row">
              <label>Event markers</label>
              <input type="checkbox" id="overlay-events" checked />
            </div>
            <div class="panel-row">
              <label>True glucose</label>
              <input type="checkbox" id="overlay-true" />
            </div>
          </div>
        </div>

        <!-- Therapy tab -->
        <div class="tab-content" id="tab-therapy">
          <div class="panel-section">
            <h3>Therapy mode</h3>
            <div class="panel-row">
              <label>Mode</label>
              <select id="therapy-mode">
                <option value="AID">AID (PID)</option>
                <option value="PUMP">Pump (open loop)</option>
                <option value="MDI">MDI</option>
              </select>
            </div>
            <div class="panel-row" id="row-target">
              <label>Glucose target</label>
              <input type="number" id="glucose-target" min="70" max="180" step="5" value="100" />
            </div>
          </div>
          <div class="panel-section">
            <h3>Insulin</h3>
            <div class="panel-row">
              <label>Rapid analogue</label>
              <select id="rapid-analogue">
                <option value="Fiasp">Fiasp</option>
                <option value="Lispro">Lispro</option>
                <option value="Aspart">Aspart</option>
              </select>
            </div>
            <div class="panel-row">
              <label>Programmed ISF</label>
              <input type="number" id="prog-isf" min="10" max="200" step="5" value="40" />
            </div>
            <div class="panel-row">
              <label>Programmed ICR</label>
              <input type="number" id="prog-cr" min="3" max="30" step="1" value="12" />
            </div>
          </div>
          <div class="panel-section" id="section-mdi">
            <h3>Long-acting (MDI)</h3>
            <div class="panel-row">
              <label>Insulin type</label>
              <select id="long-acting-type">
                <option value="Glargine">Glargine</option>
                <option value="Degludec">Degludec</option>
                <option value="Detemir">Detemir</option>
              </select>
            </div>
            <div class="panel-row">
              <label>Dose (U)</label>
              <input type="number" id="long-acting-dose" min="1" max="80" step="1" value="20" />
            </div>
            <div class="panel-row">
              <label>Injection time</label>
              <input type="time" id="long-acting-time" value="22:00" />
            </div>
          </div>
          <div class="panel-section" id="section-basal">
            <h3>Basal profile</h3>
            <div id="basal-profile-rows"></div>
            <button id="btn-add-basal" style="margin-top:8px;width:100%;padding:6px;background:var(--bg-surface);border:1px dashed var(--border);color:var(--text-muted);border-radius:6px;cursor:pointer;font-size:12px;">+ Add segment</button>
          </div>
          <div class="panel-section" id="section-temp-basal">
            <h3>Temp basal</h3>
            <div class="bolus-row">
              <input type="number" id="temp-basal-rate" min="0" max="5" step="0.05" value="0" placeholder="U/hr" />
              <input type="number" id="temp-basal-duration" min="15" max="480" step="15" value="60" placeholder="min" style="width:60px;" />
              <button id="btn-set-temp">Set</button>
            </div>
            <button id="btn-cancel-temp" style="margin-top:6px;width:100%;padding:5px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;cursor:pointer;font-size:12px;">Cancel temp basal</button>
          </div>
        </div>

        <!-- Patient tab -->
        <div class="tab-content" id="tab-patient">
          <div class="panel-section">
            <h3>True physiology</h3>
            <div class="panel-row">
              <label>True ISF</label>
              <input type="number" id="true-isf" min="10" max="200" step="5" value="40" />
            </div>
            <div class="panel-row">
              <label>True ICR</label>
              <input type="number" id="true-cr" min="3" max="30" step="1" value="12" />
            </div>
            <div class="panel-row">
              <label>Weight (kg)</label>
              <input type="number" id="patient-weight" min="30" max="180" step="1" value="75" />
            </div>
          </div>
          <div class="panel-section">
            <h3>Dawn phenomenon (EGP)</h3>
            <div class="panel-row">
              <label>Amplitude</label>
              <input type="number" id="egp-amp" min="0" max="3" step="0.1" value="1.0" />
            </div>
            <div class="panel-row">
              <label>Peak hour</label>
              <input type="number" id="egp-peak" min="0" max="23" step="1" value="5" />
            </div>
            <div class="panel-row">
              <label>Basal level</label>
              <input type="number" id="egp-basal" min="0.01" max="0.15" step="0.005" value="0.04" />
            </div>
          </div>
          <div class="panel-section">
            <h3>Absorption</h3>
            <div class="panel-row">
              <label>Carb abs time (min)</label>
              <input type="number" id="carbs-abs-time" min="120" max="600" step="30" value="360" />
            </div>
            <div class="panel-row">
              <label>Gastric emptying</label>
              <input type="number" id="gastric-rate" min="0.5" max="3" step="0.1" value="1.0" />
            </div>
          </div>
        </div>

        <!-- Session tab -->
        <div class="tab-content" id="tab-session">
          <div class="panel-section">
            <h3>Session</h3>
            <button id="btn-save" class="session-btn">💾 Save to browser</button>
            <button id="btn-load" class="session-btn">📂 Load from browser</button>
            <button id="btn-export" class="session-btn">⬇ Export JSON</button>
            <button id="btn-import" class="session-btn">⬆ Import JSON</button>
            <button id="btn-reset" class="session-btn danger">↺ Reset simulation</button>
          </div>
          <div class="panel-section">
            <h3>Status</h3>
            <div id="session-status" style="font-size:12px;color:var(--text-muted);line-height:1.6;"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Control strip -->
    <div id="control-strip">
      <button id="btn-pause" title="Pause / Resume">▶</button>

      <div id="throttle-area">
        <div id="throttle-label">
          <span>Speed</span>
          <span id="throttle-val">×10</span>
        </div>
        <input type="range" id="throttle-slider"
               min="0" max="7" step="1" value="3" />
      </div>

      <div id="sim-time">D+00:00</div>

      <div style="display:flex; align-items:baseline; gap:2px;">
        <div id="current-cgm">---</div>
        <div id="cgm-unit">mg/dL</div>
      </div>
      <div id="trend-arrow">→</div>

      <button class="quick-btn meal" id="btn-quick-meal" title="60g meal">🍽 60g</button>
      <button class="quick-btn" id="btn-quick-bolus" title="4U bolus">💉 4U</button>
      <button id="btn-panel" title="Toggle panel">⚙</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
